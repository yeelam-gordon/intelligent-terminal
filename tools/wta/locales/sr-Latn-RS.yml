time.minute_singular: "pre 1 minut"
time.minutes_other: "pre %{count} minuta"
time.hour_singular: "pre 1 sat"
time.hours_other: "pre %{count} sati"
time.day_singular: "pre 1 dan"
time.days_other: "pre %{count} dana"

