# ── Relative time + date formatting (src/ui/agents_view.rs) ─────────────────
# rust-i18n 3.x has no CLDR plural support — only string interpolation. So we
# use two flat keys per duration (singular for n=1, "other" for n≠1) and let
# Rust pick which to use. Languages without grammatical singular/plural
# distinction (CJK, Vietnamese, Thai, …) can map both keys to the same
# template. Languages with 3+ plural forms (Slavic, Arabic) compromise by
# mapping "other" to whichever form reads acceptably for the typical 2-59 /
# 2-23 / 2-6 counts in our UI; use the "many" form (5+) which sounds more
# natural for higher numbers.
# %{count} = numeric count (interpolated).
time.just_now: "just now"
time.minute_singular: "1 minute ago"
time.minutes_other: "%{count} minutes ago"
time.hour_singular: "1 hour ago"
time.hours_other: "%{count} hours ago"
time.day_singular: "1 day ago"
time.days_other: "%{count} days ago"
# Locale-aware date format for rows older than a week is handled via
# Windows GetDateFormatEx (DATE_LONGDATE) — no yml entries needed for
# month names or day/month/year ordering. Microsoft's CLDR data covers
# every locale Windows supports with higher fidelity than we could
# maintain by hand.
