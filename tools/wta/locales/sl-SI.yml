time.minute_singular: "pred 1 minuto"
time.minutes_other: "pred %{count} minutami"
time.hour_singular: "pred 1 uro"
time.hours_other: "pred %{count} urami"
time.day_singular: "pred 1 dnevom"
time.days_other: "pred %{count} dnevi"

