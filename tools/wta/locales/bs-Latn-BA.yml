time.minute_singular: "prije 1 minute"
time.minutes_other: "prije %{count} minuta"
time.hour_singular: "prije 1 sat"
time.hours_other: "prije %{count} sati"
time.day_singular: "prije 1 dan"
time.days_other: "prije %{count} dana"

